<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sequel Web Studio — Modern Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #0F1F3D;
  --navy2:  #1F3864;
  --blue:   #2E75B6;
  --blue2:  #4B9FD4;
  --purple: #8E44AD;
  --grey:   #595959;
  --grey2:  #8892A0;
  --bg:     #F4F6FB;
  --white:  #FFFFFF;
  --font:   'Space Grotesk', system-ui, sans-serif;
  --mono:   'Space Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--grey);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ---- Scroll-reveal ---- */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.65s ease, transform 0.65s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ---- Marquee ---- */
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.marquee-track {
  display: flex;
  gap: 0;
  animation: marquee 18s linear infinite;
  white-space: nowrap;
}
.marquee-track:hover { animation-play-state: paused; }

/* ---- Dot grid bg ---- */
.dot-grid {
  background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ---- Grain overlay ---- */
.grain::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  mix-blend-mode: overlay;
  opacity: 0.4;
}

/* ---- Gradient text ---- */
.grad-text {
  background: linear-gradient(135deg, #4B9FD4 0%, #8E44AD 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ---- Card hover ---- */
.hover-card {
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.hover-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 56px rgba(15,31,61,0.18) !important;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ======================================================
   SHARED UTILS
====================================================== */
const useScrollReveal = () => {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
};

const useScrolledNav = () => {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return scrolled;
};

====================================================== */

        </button>
        {/* Links */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
          {['services','about','contact'].map(p => (
            <button key={p} onClick={() => go(p)} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '6px 14px', borderRadius: 6,
              fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
              color: scrolled ? '#595959' : 'rgba(255,255,255,0.8)',

            }}>{p}</button>

            marginLeft: 10,

            color: '#1F3864', border: 'none', cursor: 'pointer',
            padding: '9px 20px', borderRadius: 8,

            boxShadow: '0 4px 14px rgba(15,31,61,0.2)',
            transition: 'all 0.2s',
          }}>Get a Free Quote</button>
        </div>
      </div>
    </nav>
  );
};
